# Traefik static config. Routes by Host header to containers labeled
# traefik.enable=true. Add an app = add labels; no edit here needed.
entryPoints:
  web:
    address: ":80"

providers:
  docker:
    exposedByDefault: false   # only routes containers with traefik.enable=true
    network: homelab          # the shared docker network (see compose.yaml)

api:
  dashboard: true
  insecure: true              # dashboard on :8080, localhost only

log:
  level: INFO
accessLog: {}
