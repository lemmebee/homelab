# Traefik static config.
# Routes are defined in dynamic/routes.yaml (file provider). We use the file
# provider instead of the docker provider because Docker Engine 29 dropped the
# legacy API version (1.24) that Traefik's docker client hardcodes.
entryPoints:
  web:
    address: ":80"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true                 # edits to routes.yaml apply live, no restart

api:
  dashboard: true               # served at http://traefik.localhost (see dynamic/routes.yaml)

log:
  level: INFO
accessLog: {}
