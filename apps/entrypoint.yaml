# entrypoint-v2 — React/Vite static SPA (nginx, port 80)
services:
  entrypoint:
    build:
      context: ../../entrypoint-v2
    image: homelab/entrypoint:latest
    container_name: entrypoint
    restart: unless-stopped
    # Routing lives in ../dynamic/routes.yaml (traefik file provider).
    networks:
      - web

networks:
  web:
    name: homelab
