# ouioui — FastAPI French flashcards (uvicorn, port 8080)
services:
  ouioui:
    build:
      context: ../../ouioui
    image: homelab/ouioui:latest
    container_name: ouioui
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/data/ouioui.db          # persisted, see volume below
      - DEEPL_API_KEY=${DEEPL_API_KEY:-}
    volumes:
      - ouioui-data:/data
    # Routing lives in ../dynamic/routes.yaml (traefik file provider).
    networks:
      - web

volumes:
  ouioui-data:

networks:
  web:
    name: homelab
