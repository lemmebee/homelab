# Template for a new app. Steps:
#   1. cp apps/_template.yaml apps/<name>.yaml
#   2. replace every NAME with your app slug, set the port and build context
#   3. add `- apps/<name>.yaml` to include: in ../compose.yaml
#   4. add a router + service for it in ../dynamic/routes.yaml (see existing)
#   5. make rollout app=<name>   ->   live at http://<name>.localhost
#   6. sudo systemctl restart homelab-mdns   ->   http://<name>.local on the LAN
services:
  NAME:
    build:
      context: ../../NAME          # path to the app source (sibling of homelab/)
    image: homelab/NAME:latest
    container_name: NAME
    restart: unless-stopped
    # environment:
    #   - KEY=${KEY:-}
    # volumes:
    #   - NAME-data:/data
    networks:
      - web

# volumes:
#   NAME-data:

networks:
  web:
    name: homelab
